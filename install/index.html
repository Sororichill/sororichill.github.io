<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sororichill — Installer l'application</title>
  <meta name="description" content="Installez Sororichill sur votre téléphone.">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="theme-color" content="#C35817">
  <meta property="og:title" content="Sororichill — Installer l'application">
  <meta property="og:description" content="Installez Sororichill sur iOS ou Android.">
  <meta property="og:image" content="https://sororichill.com/favicon.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">

  <script>
    // Fire the redirect BEFORE any CSS/font/analytics blocks rendering.
    // Mobile users never see the page; only desktop reaches the styled UI below.
    (function () {
      var APP_STORE_URL = 'https://apps.apple.com/app/sororichill/id6760420583';
      var ANDROID_FORM_URL = 'https://docs.google.com/forms/d/18KQXKcAqrducV8PKgalKSL4KHvWPU6t9QhLJdHy3fOo/viewform';
      var ua = navigator.userAgent || '';
      var isAndroid = /android/i.test(ua);
      var isIOS = /iphone|ipad|ipod/i.test(ua) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

      window.__sc = {
        lang: (navigator.language || 'en').toLowerCase().startsWith('fr') ? 'fr' : 'en',
        isIOS: isIOS,
        isAndroid: isAndroid,
        APP_STORE_URL: APP_STORE_URL,
        ANDROID_FORM_URL: ANDROID_FORM_URL
      };

      // Send a Umami event using fetch + keepalive so it survives the
      // imminent window.location.replace. Fire-and-forget.
      function track(eventName) {
        try {
          var payload = {
            type: 'event',
            payload: {
              website: '3ca301d8-0eb5-44f6-8b2c-50a3ce48848c',
              hostname: location.hostname,
              screen: (screen.width || 0) + 'x' + (screen.height || 0),
              language: navigator.language || 'en',
              title: document.title,
              url: location.pathname + location.search,
              referrer: document.referrer || '',
              name: eventName
            }
          };
          fetch('https://cloud.umami.is/api/send', {
            method: 'POST',
            mode: 'cors',
            keepalive: true,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          }).catch(function () {});
        } catch (e) {}
      }

      function go(eventName, url) {
        track(eventName);
        // Tiny delay lets the fetch enter the network queue before navigation.
        setTimeout(function () { window.location.replace(url); }, 50);
      }

      if (isIOS) { go('install_redirect_ios', APP_STORE_URL); return; }
      if (isAndroid) { go('install_redirect_android', ANDROID_FORM_URL); return; }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" media="print" onload="this.media='all'"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap">
  <noscript>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap">
  </noscript>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #FFFDF8;
      color: #1A1A1A;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .heading { font-family: 'Outfit', 'Inter', system-ui, sans-serif; }
    .container { max-width: 36rem; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .center { text-align: center; }
    .logo {
      display: block; margin: 0 auto 1.25rem;
      width: 5rem; height: 5rem; border-radius: 1rem;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.875rem; font-weight: 800; margin: 0 0 0.5rem; }
    .subtitle { color: #5C3D2E; margin: 0.5rem 0 0; }
    .links {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 1.5rem;
    }
    .links.show { display: flex; }
    @media (min-width: 640px) {
      .links.show { flex-direction: row; }
    }
    .btn {
      display: inline-block;
      text-align: center;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      background: #C35817;
      color: white;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s ease;
    }
    .btn:hover, .btn:focus { background: #A84A14; }
  </style>
</head>
<body>
  <div class="container">
    <div class="center">
      <img src="/favicon.png" alt="Sororichill" class="logo">
      <h1 class="heading" id="title">Installer Sororichill</h1>
      <p class="subtitle" id="subtitle">Redirection…</p>
    </div>

    <div id="desktop-links" class="links">
      <a href="https://apps.apple.com/app/sororichill/id6760420583"
         data-umami-event="install_click_app_store"
         data-umami-event-source="desktop"
         class="btn">App Store</a>
      <a href="https://docs.google.com/forms/d/18KQXKcAqrducV8PKgalKSL4KHvWPU6t9QhLJdHy3fOo/viewform"
         target="_blank" rel="noopener"
         data-umami-event="install_click_play_store"
         data-umami-event-source="desktop"
         class="btn">Google Play (beta)</a>
    </div>
  </div>

  <script>
    (function () {
      var sc = window.__sc || {};
      var lang = sc.lang || 'en';
      var strings = {
        fr: {
          title: 'Installer Sororichill',
          subtitleIOS: 'Redirection vers l\u2019App Store\u2026',
          subtitleAndroid: 'Redirection vers le formulaire b\u00eata\u2026',
          subtitleDesktop: 'Ouvrez cette page sur votre t\u00e9l\u00e9phone pour installer l\u2019app.'
        },
        en: {
          title: 'Install Sororichill',
          subtitleIOS: 'Redirecting to the App Store\u2026',
          subtitleAndroid: 'Redirecting to the beta form\u2026',
          subtitleDesktop: 'Open this page on your phone to install the app.'
        }
      };
      var t = strings[lang];

      document.documentElement.lang = lang;
      document.getElementById('title').textContent = t.title;
      var subtitle = document.getElementById('subtitle');

      if (sc.isIOS) { subtitle.textContent = t.subtitleIOS; return; }
      if (sc.isAndroid) { subtitle.textContent = t.subtitleAndroid; return; }

      subtitle.textContent = t.subtitleDesktop;
      document.getElementById('desktop-links').classList.add('show');
    })();
  </script>

  <script defer src="https://cloud.umami.is/script.js" data-website-id="3ca301d8-0eb5-44f6-8b2c-50a3ce48848c"></script>
</body>
</html>
