<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sororichill</title>
  <meta name="description" content="Opening Sororichill…">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#C35817">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    h1, h2, .heading { font-family: 'Outfit', 'Inter', sans-serif; }
  </style>
</head>
<body class="h-screen overflow-hidden bg-[#FFFDF8] text-[#1A1A1A] flex items-center justify-center">
  <noscript>
    <div class="max-w-xl mx-auto px-6 text-center">
      <h1 class="heading text-3xl font-extrabold mb-4">Sororichill</h1>
      <p class="mb-6">To open this link, please install the app:</p>
      <p class="space-x-3">
        <a class="underline" href="https://apps.apple.com/us/app/sororichill/id6760420583">App Store</a>
        <a class="underline" href="https://play.google.com/store/apps/details?id=app.sororichill">Play Store</a>
      </p>
    </div>
  </noscript>

  <div id="loader" class="max-w-xl mx-auto px-6 text-center">
    <img src="/favicon.png" alt="Sororichill" class="mx-auto mb-6 w-24 h-24 rounded-2xl shadow-md">
    <h1 class="heading text-3xl font-extrabold mb-3">Sororichill</h1>
    <p class="text-[#5C3D2E] mb-8" id="loader-msg">Open this activity in the Sororichill app.</p>
    <div id="store-links" class="flex flex-col sm:flex-row gap-3 justify-center"></div>
  </div>

  <script>
    (function () {
      var APP_STORE_URL  = 'https://apps.apple.com/us/app/sororichill/id6760420583';
      var PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=app.sororichill';
      var HOME_URL       = 'https://sororichill.com/';

      var path = window.location.pathname || '';
      var ua = navigator.userAgent || '';
      var isAndroid = /android/i.test(ua);
      var isIOS = /iphone|ipad|ipod/i.test(ua) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

      // Match /activities/<id> (with or without trailing slash or extra segments).
      var activityMatch = path.match(/^\/activities\/([^\/?#]+)/);

      function setMessage(msg) {
        var el = document.getElementById('loader-msg');
        if (el) el.textContent = msg;
      }

      function addStoreButton(href, label) {
        var container = document.getElementById('store-links');
        if (!container) return;
        var a = document.createElement('a');
        a.href = href;
        a.className = 'inline-block px-6 py-3 rounded-full bg-[#C35817] text-white font-semibold hover:bg-[#A84A14] transition';
        a.textContent = label;
        container.appendChild(a);
      }

      if (!activityMatch) {
        // Unknown path — show a soft 404 with a link home.
        setMessage('Page not found.');
        addStoreButton(HOME_URL, 'Back to sororichill.com');
        return;
      }

      // Known activity path. If the app is installed, the Universal Link /
      // App Link handoff will open the app directly and this page is never
      // shown. If it reaches here, the user doesn't have the app — show
      // store buttons but do NOT auto-redirect (auto-redirect races with
      // the UL handoff and can bounce users to the store after the app
      // already opened).
      if (isIOS) {
        addStoreButton(APP_STORE_URL, 'Get it on the App Store');
      } else if (isAndroid) {
        addStoreButton(PLAY_STORE_URL, 'Get it on Google Play');
      } else {
        addStoreButton(APP_STORE_URL, 'App Store');
        addStoreButton(PLAY_STORE_URL, 'Google Play');
      }
    })();
  </script>
</body>
</html>
